# RL stack for the robotaxi Unity gym.
# Run from repo root: `docker compose up -d`
# Then start the Unity client:    `.\scripts\RunClientWrapper.ps1`
#
# Bind-mounts assume this layout (LATEST/ is the repo's parent dir):
#   LATEST/
#     rl-roboracer/         <- this repo
#     saved_models/         <- model checkpoints
#     mongodb/              <- mongo data dir
#     tfrecords/            <- demo trajectories
#     tmp/                  <- tensorboard / runtime scratch

services:
  ros-server:
    image: docker_ros-server:thin
    # Pin the container name so Compose doesn't auto-suffix it with the
    # replica index ("-1"). Without this, the base container ends up
    # named "<project>-ros-server-1", which Docker's embedded DNS then
    # also resolves under the short name "ros-server-1" - colliding
    # with the actual ros-server-1 service brought up by compose/scale.yml
    # and silently routing actor-1's worker to actor-0's container.
    container_name: rl-roboracer-ros-server-base
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SAVED_MODELS_DIR=/saved_models
      - ROBOT_TYPE=robotaxi
      - UNITY_MACHINE_IP=host.docker.internal
    build:
      context: ./docker/ros_server
      dockerfile: Dockerfile
    volumes:
      - type: bind
        source: ./rl_agent
        target: /python_ws/src
      - type: bind
        source: ../saved_models
        target: /saved_models
    ports:
      - "10000:10000"
      - "50051:50051"
    # ros-server-0 alias keeps the Python default (ros-server-0:50051) working
    # whether or not compose/scale.yml is layered in. With the scale overlay,
    # actors 1..3 reach the additional ros-server-1..3 services by their
    # service names; the overlay does not need to redeclare this alias.
    networks:
      default:
        aliases:
          - ros-server-0
    command: sh -c "./src/start.sh"

  mongo:
    image: bitnami/mongodb:6.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGODB_ROOT_PASSWORD: example
      MONGODB_REPLICA_SET_MODE: primary
      MONGODB_ADVERTISED_HOSTNAME: mongo
      MONGODB_REPLICA_SET_KEY: 64321d2b6ce8b4318b337bb1
    ports:
      - "27017:27017"
    volumes:
      - type: bind
        source: ../mongodb
        target: /data/db
      - type: bind
        source: ../mongodb
        target: /bitnami/mongodb

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/

  sim-controller:
    image: sim_controller:latest
    build:
      context: .
      dockerfile: docker/sim_controller/Dockerfile
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SAVED_MODELS_DIR=/saved_models
      - ROBOT_TYPE=robotaxi
      - DATABASE_NAME=robotaxi
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - type: bind
        source: ./rl_agent
        target: /python_ws/src
      - type: bind
        source: ../saved_models
        target: /saved_models
      - type: bind
        source: ../tfrecords
        target: /tfrecords
      - type: bind
        source: ../tmp
        target: /tmp
    ports:
      - "6006:6006"
    # `python -u` forces unbuffered stdout so the dashboard's live log
    # view (which tails this file via WebSocket) updates per-line
    # instead of per-8KB-block. Python switches from line-buffered to
    # block-buffered automatically when it detects stdout is a pipe
    # (via the `| tee`), and -u overrides that.
    command: sh -c "(tensorboard --bind_all --logdir /tmp/active --reload_multifile true &1> /tmp/tb.log) && cd /python_ws/src && python -u robotaxi.py 2>&1 | tee robotaxi.out"
    # No `links:` block. Compose's legacy links: ["ros-server"] would
    # also auto-add per-link aliases of the form
    #   <linked-container>:<service>-<replica-index>
    # i.e. "ros-server-base:ros-server-1". Those aliases are scoped to
    # this container's view of the embedded DNS and SHADOW the network-
    # wide alias "ros-server-1" registered on the dedicated ros-server-1
    # service from compose/scale.yml - meaning sim-controller's actor-1
    # worker silently routes back to the base ros-server container
    # alongside actor-0, while the real ros-server-1 sits idle.
    # On modern Compose networks every service on the default network
    # already resolves its peers by service name and explicit
    # `networks.<net>.aliases:`, so links: is unnecessary.

  dashboard:
    image: node:15.8
    restart: always
    ports:
      - "80:80"
      - "8080:8080"
    environment:
      - DATABASE_NAME=robotaxi
    volumes:
      - type: bind
        source: ./dashboard
        target: /dashboard
      - type: bind
        source: ./rl_agent
        target: /python_ws/src
      - type: bind
        source: ../tmp
        target: /tmp
    command: sh -c "cd /dashboard && npm start"
