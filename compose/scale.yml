# Multi-actor scale overlay for the RL stack.
#
# Adds three additional ros-server services (1..3) to the base
# docker-compose.yml so 4 Unity clients can each connect to their own
# ROS-TCP/gRPC endpoint. Run with:
#
#   docker compose -f docker-compose.yml -f compose/scale.yml up -d
#
# Python code addresses all four endpoints with a consistent
# ros-server-0..ros-server-3 scheme. The "ros-server-0" alias on the base
# service is declared in docker-compose.yml so single-actor runs (without
# this overlay) also resolve ros-server-0:50051.
#
# Host port map (Unity clients on the Windows host connect via these):
#
#   actor 0  ROS-TCP host.docker.internal:10000 -> ros-server   :10000
#            gRPC                          50051 -> ros-server   :50051
#   actor 1  ROS-TCP                       10001 -> ros-server-1 :10000
#            gRPC                          50052 -> ros-server-1 :50051
#   actor 2  ROS-TCP                       10002 -> ros-server-2 :10000
#            gRPC                          50053 -> ros-server-2 :50051
#   actor 3  ROS-TCP                       10003 -> ros-server-3 :10000
#            gRPC                          50054 -> ros-server-3 :50051
#
# Inside the Compose network, services on the sim-controller side reach
# them as ros-server-0:50051 .. ros-server-3:50051.

x-ros-server-base: &ros-server-base
  image: docker_ros-server:thin
  restart: always
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    - SAVED_MODELS_DIR=/saved_models
    - ROBOT_TYPE=robotaxi
    - UNITY_MACHINE_IP=host.docker.internal
  build:
    context: ./docker/ros_server
    dockerfile: Dockerfile
  volumes:
    - type: bind
      source: ./rl_agent
      target: /python_ws/src
    - type: bind
      source: ../saved_models
      target: /saved_models
  command: sh -c "./src/start.sh"

# Each container_name below is pinned to "<service>-pinned" rather than
# letting Compose auto-suffix the replica index. Docker's embedded DNS
# treats the auto-numbered "<project>-ros-server-N-1" form as also
# resolvable under the short suffix "ros-server-N-1", which happens to
# not collide with anything we currently look up - but the same trap
# bit us on the base service (see docker-compose.yml). Pinning here is
# defensive against a future actor-N indexing scheme that tripped over
# the same surprise.
services:
  ros-server-1:
    <<: *ros-server-base
    container_name: robot-tycoonrefactor-ros-server-1-pinned
    ports:
      - "10001:10000"
      - "50052:50051"
    networks:
      default:
        aliases:
          - ros-server-1

  ros-server-2:
    <<: *ros-server-base
    container_name: robot-tycoonrefactor-ros-server-2-pinned
    ports:
      - "10002:10000"
      - "50053:50051"
    networks:
      default:
        aliases:
          - ros-server-2

  ros-server-3:
    <<: *ros-server-base
    container_name: robot-tycoonrefactor-ros-server-3-pinned
    ports:
      - "10003:10000"
      - "50054:50051"
    networks:
      default:
        aliases:
          - ros-server-3

  # Override sim-controller's auto-run-trainer command. The base
  # docker-compose.yml command starts `python robotaxi.py` (single-env)
  # automatically so single-actor users on `docker compose up -d` get
  # training driving the moment the stack is alive. In scale-overlay
  # mode that auto-run is unwanted: it polls the same MongoDB job queue
  # the user's multi-env exec is also polling, and (worse) it drives
  # actor-0's car continuously - which makes the [actor-0] log volume
  # dwarf [actor-1..3] until the multi-env trainer reaches its first
  # collect step.
  #
  # When the overlay is active, the container instead just hosts
  # tensorboard and waits. The user starts the multi-env trainer
  # explicitly:
  #
  #   docker compose -f docker-compose.yml -f compose/scale.yml \
  #     exec sim-controller bash -c \
  #     'cd /python_ws/src && python robotaxi.py --num-envs 4 \
  #      2>&1 | tee robotaxi.out'
  #
  # The trailing `tee robotaxi.out` keeps the dashboard log panel
  # working - the dashboard tails /python_ws/src/robotaxi.out which
  # the base command also wrote. Without `tee`, the file stays stale
  # and the dashboard log view shows old data.
  sim-controller:
    command: >-
      sh -c "tensorboard --bind_all --logdir /tmp/active
      --reload_multifile true 2>&1 | tee /tmp/tb.log"
