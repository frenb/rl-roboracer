version: '3.4'
services:
  ros-server:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    image: docker_ros-server:latest
    #image: robottycoon.azurecr.io/unity-robotics-pick-and-place
    restart: always
    environment:
      - SAVED_MODELS_DIR=/saved_models
      - ROBOT_TYPE=robotaxi
      #- UNITY_MACHINE_IP=simulator commented out and should revert to standard behavior of pointing to localhost
      - UNITY_MACHINE_IP=host.docker.internal
    build:
      #from: robottycoon.azurecr.io/unity-robotics-pick-and-place 
      context:  C:\Users\benja\Documents\robots\LATEST\robot-tycoon\Docker\pick_and_place
      dockerfile: docker\Dockerfile
    volumes:  
      - type: bind
        source: C:\Users\benja\Documents\robots\LATEST\robot-tycoon\Frontend\public\workspaces\python 
        target: /python_ws/src
      - type: bind
        source: C:\Users\benja\Documents\robots\LATEST\saved_models 
        target: /saved_models
    ports:
      - "10000:10000" 
      - "50051:50051" 
      # - "60061:60061" 
      # - "60062:60062"
    command: sh -c "./src/start.sh"
    links:
      #- "simulator"
      - "sim-controller"
  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:  
      - type: bind
        source: C:\Users\benja\Documents\robots\LATEST\mongodb\
        target: /data/db
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
  sim-controller:
    image: sim_controller:latest
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SAVED_MODELS_DIR=/saved_models
      - ROBOT_TYPE=robotaxi
      - NVIDIA_DEVICE_ID=0
    volumes:  
      - type: bind
        source: C:\Users\benja\Documents\robots\LATEST\robot-tycoon\Frontend\public\workspaces\python 
        target: /python_ws/src
      - type: bind
        source: C:\Users\benja\Documents\robots\LATEST\saved_models 
        target: /saved_models
    ports:
      - "6006:6006"
      # - "60061:60061" 
      # - "60062:60062"
    command: bash -c "(tensorboard --bind_all --logdir /tmp --reload_multifile true &1> /tmp/tb.log) && cd /python_ws/src && python robotaxi.py 2>&1 | tee robotaxi.out"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    links:
      #- "simulator"
      - "mongo"
  # simulator:
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   image: racelinux:latest
  #   restart: always
  #   environment:
  #     - NVIDIA_VISIBLE_DEVICES=all
  #     - NVIDIA_DRIVER_CAPABILITIES=compute,utility
  #   ports:
  #     - "5005:5005"
  #   command: ["bash", "-c", "./linux_racer/w-course-linux.x86_64", "--env=DISPLAY=host.docker.internal:0", "--volume=/tmp/.X11-unix:/tmp/.X11-unix"]
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
    #links:
      #- "ros-server"
      # - "webapp"
  webapp:
    image: node:15.8
    restart: always
    ports:
      - "80:80"
    volumes:
      - type: bind
        source: C:\Users\benja\Documents\robots\LATEST\robot-tycoon\WebApp
        target: /WebApp
    command: sh -c "cd /WebApp && npm start"                                                                       
