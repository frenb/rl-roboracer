version: '3.4'
#  docker 
#   run -it --rm -v 
#   $(pwd)/Frontend/public/workspaces/pole_cart_python:/python_ws/src 
#   -p 10000:10000 
#   -p 50051:50051 
#   -p 60061:60061 
#   -p 60062:60062 
#   robottycoon.azurecr.io/unity-robotics-pick-and-place 
#   ./src/start.sh
#
# host.docker.internal

services:
  ros-server:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    image: docker_ros-server:thin
    restart: always
    environment:
      - SAVED_MODELS_DIR=/saved_models
      - ROBOT_TYPE=robotaxi
      #- UNITY_MACHINE_IP=simulator commented out and should revert to standard behavior of pointing to localhost
      - UNITY_MACHINE_IP=host.docker.internal
    build:
      #from: robottycoon.azurecr.io/unity-robotics-pick-and-place 
      context:  C:\Users\benja\Documents\agents\robots\LATEST\robot-tycoon\Docker\pick_and_place
      dockerfile: docker\Dockerfile
    volumes:  
      - type: bind
        source: C:\Users\benja\Documents\agents\robots\LATEST\robot-tycoon\Frontend\public\workspaces\python 
        target: /python_ws/src
      - type: bind
        source: C:\Users\benja\Documents\agents\robots\LATEST\saved_models 
        target: /saved_models
    ports:
      - "10000:10000" 
      - "50051:50051" 
      # - "60061:60061" 
      # - "60062:60062"
    command: sh -c "./src/start.sh"
    # links:
    #   - "simulator"
    #   - "sim-controller"
  mongo:
    #image: mongo
    image: bitnami/mongodb:6.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGODB_ROOT_PASSWORD: example
      MONGODB_REPLICA_SET_MODE: primary
      MONGODB_ADVERTISED_HOSTNAME: mongo
      MONGODB_REPLICA_SET_KEY: 64321d2b6ce8b4318b337bb1
    #entrypoint: [  "/usr/bin/mongod", "--bind_ip_all", "--replSet", "rs0" ]
    ports:
      - 27017:27017
    volumes:  
      - type: bind
        source: C:\Users\benja\Documents\agents\robots\LATEST\mongodb\
        target: /data/db
      - type: bind
        source: C:\Users\benja\Documents\agents\robots\LATEST\mongodb\
        target: /bitnami/mongodb
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
  # front-end:
  #   image: node:15.8
  #   restart: always
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - type: bind
  #       source: C:\Users\benja\Documents\robots\LATEST\robot-tycoon\Frontend
  #       target: /Frontend
  #   links:
  #     - "ros-server"
  #     # - "webapp"
  #   command: sh -c "cd /Frontend && npm start"
  sim-controller:
    image: sim_controller:latest
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SAVED_MODELS_DIR=/saved_models
      - ROBOT_TYPE=robotaxi
      - DATABASE_NAME=robotaxi
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:  
      - type: bind
        source: C:\Users\benja\Documents\agents\robots\LATEST\robot-tycoon\Frontend\public\workspaces\python 
        target: /python_ws/src
      - type: bind
        source: C:\Users\benja\Documents\agents\robots\LATEST\saved_models 
        target: /saved_models
      - type: bind
        source: C:\Users\benja\Documents\agents\robots\LATEST\tfrecords 
        target: /tfrecords
      - type: bind
        source: C:\Users\benja\Documents\agents\robots\LATEST\tmp 
        target: /tmp
    ports:
      # - "5005:5005"
      - "6006:6006"
      # - "60061:60061" 
      # - "60062:60062"
    command: sh -c "(tensorboard --bind_all --logdir /tmp/active --reload_multifile true &1> /tmp/tb.log) && cd /python_ws/src && python robotaxi.py 2>&1 | tee robotaxi.out"
    links:
      # - "simulator"
      - "mongo"
      - "ros-server"
  # simulator:
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   image: racelinux:latest
  #   restart: always
  #   ports:
  #     - "5005:5005"
  #   links:
  #     - "ros-server"
      # - "webapp"
  webapp:
    image: node:15.8
    restart: always
    ports:
      - "80:80"
      - "8080:8080"
    environment:
      - DATABASE_NAME=robotaxi
    volumes:
      - type: bind
        source: C:\Users\benja\Documents\agents\robots\LATEST\robot-tycoon\WebApp
        target: /WebApp
      - type: bind
        source: C:\Users\benja\Documents\agents\robots\LATEST\robot-tycoon\Frontend\public\workspaces\python 
        target: /python_ws/src
      - type: bind
        source: C:\Users\benja\Documents\agents\robots\LATEST\tmp 
        target: /tmp
    command: sh -c "cd /WebApp && npm start"                                                                       


